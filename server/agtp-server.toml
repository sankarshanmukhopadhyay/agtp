# Demo server config consumed by ./run_demo.sh.
#
# A real deployment ships its own copy of this file; the demo's values
# are placeholders that surface in the Server Manifest so the manifest
# scenarios produce stable, recognizable output.

[server]
server_id = "agents.agtp.io"
operator  = "AGTP demo runner"
contact   = "help@agtp.io"
# domain  = "agents.agtp.io"     # optional: distinct operational host

[policies]
wildcards_accepted             = true
anonymous_discovery            = true
scope_required_for_invocation  = true
synthesis_enabled              = true
max_synthesis_depth            = 10

# Per-server method policy (agtp-api §8). Replaces the pre-§6
# methods.txt file. The demo's defaults are permissive: every
# approved AGTP method is admitted. Production deployments
# typically list specific methods and opt out of legacy verbs:
#
#   [policies.methods]
#   allow  = ["QUERY", "DISCOVER", "RECONCILE", "AUDIT", "EVALUATE"]
#   legacy = "NONE"
#
# Servers that bridge HTTP-style traffic during a migration may opt
# into specific legacy HTTP verbs and redirect them to canonical
# AGTP methods:
#
#   [policies.methods]
#   allow  = "*"
#   legacy = ["GET", "POST"]
#
#   [[policies.methods.redirects]]
#   from_method = "GET"
#   from_path   = "/orders"
#   to_method   = "FETCH"
#   to_path     = "/orders"
#
#   [[policies.methods.redirects]]
#   from_method = "POST"
#   from_path   = "/orders"
#   to_method   = "CREATE"
#   to_path     = "/orders"
[policies.methods]
allow = "*"

[agents]
disclosure = "public"

# Synthesis runtime: composition policies tried in declaration order
# when PROPOSE arrives. The runtime always appends a final
# "passthrough" fallback so a proposal naming an existing method
# automatically becomes a one-step identity plan. Custom policies
# (graph, llm, etc.) can be registered by deployments that need
# smarter composition.
#
# §7 duration fields control how long an accepted synthesis lives:
#   - session_duration:            TTL for non-persistent syntheses.
#   - persistent_default_duration: granted when an agent requests
#                                  persistent=true without naming a
#                                  duration.
#   - persistent_max_duration:     hard cap for persistent requests.
#
# §7 async PROPOSE: when async_evaluation_enabled = true the server
# returns 261 Negotiation In Progress with a proposal_id; agents
# poll QUERY /proposals with {"proposal_id": "..."} to retrieve the
# final outcome. Default false (every PROPOSE resolves synchronously).
[synthesis]
policies                     = ["recipes"]
recipes_file                 = "agtp-recipes.toml"
session_duration             = "24h"
persistent_default_duration  = "7d"
persistent_max_duration      = "30d"
async_evaluation_enabled     = false
max_evaluation_duration      = "10m"

# §7 audit log. ``path = "stderr"`` (default) writes JSONL to stderr;
# any other string is a filesystem path; ``"none"`` disables logging.
# Each PROPOSE outcome (accepted / rejected / pending / malformed)
# produces one line with timestamp, agent_id, proposal_hash,
# decision, and (when relevant) synthesis_id / proposal_id / reason.
#
# §10 attribution_records_enabled: when true, every response carries
# an ``Attribution-Record`` header containing a JSON-encoded
# attestation of the response's origin (server_id + timestamp +
# status + signature). The v00 signature is a placeholder; a future
# revision replaces it with a JWS compact serialization once §5
# manifest signing lands. Default false.
[audit]
path                         = "stderr"
attribution_records_enabled  = false

# Gateway socket: when set, the daemon binds this path for accepting
# runtime-module connections (mod_python, mod_php, ...). Empty means
# gateway mode is off and registered_function endpoints resolve
# in-daemon via Python imports (the legacy path). The --gateway-socket
# command-line flag overrides this value at boot.
#
# Two transport forms:
#   socket = "/var/run/agtpd/gateway.sock"   # Unix domain socket
#   socket = "127.0.0.1:4481"                # TCP loopback
#
# See docs/architecture/gateway-protocol-v1.md.
[gateway]
socket = ""

# Ed25519 signing: when enabled the daemon loads a private key at
# boot and uses it to sign Attribution-Record headers and (when
# mod_audit is loaded with AGTP_AUDIT_SIGN_RECEIPTS=1) audit
# receipts. Generate a key pair with:
#
#   python -m tools.generate_signing_key /etc/agtpd/signing
#
# The daemon refuses to boot when [signing].enabled = true and the
# key_path cannot be loaded — silently falling back to unsigned
# would be a security regression for a deployment that asked for
# signing.
[signing]
enabled  = false
key_path = ""
key_id   = ""  # Optional; derived from the public key when omitted.

# Mutual TLS (Agent-Cert verification). When mode is "optional" or
# "required", the daemon verifies client certs against the CA bundle
# during the TLS handshake, extracts the Ed25519 public key, and
# derives the canonical Agent-ID = SHA-256(public-key-raw-bytes).
# Connections present `trust.method = "agent_cert_mtls"` to handlers
# and runtime modules; connections without certs (in "optional" mode)
# fall back to `trust.method = "agent_id_header"`.
#
# Generate agent certs with:
#
#   python -m tools.generate_agent_cert agents/lauren
#
# require_agent_id_match: when true (default), a request that carries
# both a verified cert AND an Agent-ID header MUST agree. Mismatch
# returns 401. Disable only if you have a written reason to allow
# header-vs-cert disagreement.
[mtls]
mode                     = "disabled"  # disabled | optional | required
ca_bundle_path           = ""
require_agent_id_match   = true

# APIs: resource-scoped endpoints the workplace exposes. Servers with
# multi-resource architectures populate this. Each entry lists the
# methods admissible against that resource.
[[apis]]
path        = "/calendar"
methods     = ["QUERY", "PROPOSE"]
description = "Calendar resource. QUERY availability, PROPOSE bookings."

[[apis]]
path        = "/notes"
methods     = ["QUERY", "SUMMARIZE"]
description = "Free-form notes; QUERY for retrieval, SUMMARIZE for digest."

# Hosted protocols: non-AGTP applications this server bridges. The
# elemen browser surfaces these as tabs (MCP gets a tool-catalog view;
# OpenAPI / GraphQL get stub tabs pending future work). The demo
# server is not itself an MCP host — that surface belongs to the
# MCP-on-AGTP gateway (see agtp-mcp/gateway.py), which advertises
# `application.type == "mcp"` on its identity doc directly.
[[hosted_protocols]]
protocol = "openapi"
version  = "3.1"
endpoint = "https://api.agtp.io"
catalog  = "https://api.agtp.io/openapi.json"
