# Propose-flow test fixture: a self-contained method spec with no
# external substitution targets, suitable for round-tripping through
# `agtp --propose --params-file` without --known-methods overrides.

name: RECONCILE
semantic:
  intent: Reconciles transactions for the named account and period
  actor: agent
  outcome: A reconciliation summary listing matched and unmatched entries is returned
  capability: transaction
  confidence_guidance: 0.9
  impact_tier: reversible
  is_idempotent: false

description: >-
  Walk every transaction in the named account+period window and emit
  a summary of which entries matched the ledger and which did not.

category: transact
required_params:
  - name: account_id
    type: string
    description: The ledger account to reconcile
  - name: period
    type: string
    description: Time window like 2026-Q1
optional_params:
  - name: tolerance
    type: number
    description: Rounding tolerance in account currency

error_codes: [400, 422, 451]

source: amg/1.0
namespace: acme-finance
