name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .
      - name: Run unit + invocation + path tests
        run: python -m unittest discover -v
      - name: Run end-to-end demo (POSIX hosts only)
        if: runner.os != 'Windows'
        run: cd v1 && bash run_demo.sh
      - name: Run end-to-end demo (Git Bash on Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd v1 && bash run_demo.sh
